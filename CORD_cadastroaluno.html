<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno - CCI</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhCEBRiOnJ4WSaugF7R9v1NsEo_3cIbNliFA&s"
        style="border-radius: 50%;">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="tema.css">
    <link rel="stylesheet" href="CORD_cadastroaluno.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <aside class="sidebar">

        <div>

            <div class="logo-area">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhCEBRiOnJ4WSaugF7R9v1NsEo_3cIbNliFA&s"
                    class="logo-img">
            </div>

            <div class="menu-links">

                <a href="CORD_painel.html" class="nav-link-custom ">
                    <span class="material-icons-outlined">home</span>
                    Inicio
                </a>

                <a href="CORD_turmas.html" class="nav-link-custom">
                    <span class="material-icons-outlined">groups</span>
                    Turmas
                </a>

                <a href="CORD_notas.html" class="nav-link-custom">
                    <span class="material-icons-outlined">edit_note</span>
                    Notas
                </a>

                <a href="CORD_dashboard.html" class="nav-link-custom">
                    <span class="material-icons-outlined">leaderboard</span>
                    Painel
                </a>

            </div>

        </div>

    </aside>

    <main class="main-container-cadastroaluno">
        <div class="form-area-cadastroaluno">
            <h2>Ficha de Matrícula</h2>
            <form id="formCadastro">

                <div class="section-title-cadastroaluno">Dados do Aluno</div>
                <div class="form-grid-cadastroaluno">
                    <div class="form-group-cadastroaluno full-width-cadastroaluno">
                        <label>Nome Completo do Aluno</label>
                        <input type="text" id="nome_completo" placeholder="Nome do aluno" required>
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Data de Nascimento</label>
                        <input type="date" id="data_nascimento">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>CPF do Aluno</label>
                        <input type="text" id="cpf_aluno" placeholder="000.000.000-00" oninput="formatarCPF(this)"
                            maxlength="14">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Telefone do Aluno</label>
                        <input type="text" id="telefone_aluno" placeholder="(00) 00000-0000"
                            oninput="formatarTelefone(this)" maxlength="15">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Email do Aluno</label>
                        <input type="email" id="email_aluno" placeholder="Email do aluno">
                    </div>
                </div>

                <div class="section-title-cadastroaluno">Dados do Responsável</div>
                <div class="form-grid-cadastroaluno">
                    <div class="form-group-cadastroaluno full-width-cadastroaluno">
                        <label>Nome Completo do Responsável</label>
                        <input type="text" id="nome_responsavel" placeholder="Nome do responsável">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>CPF do Responsável</label>
                        <input type="text" id="cpf_responsavel" placeholder="000.000.000-00" oninput="formatarCPF(this)"
                            maxlength="14">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Telefone do Responsável</label>
                        <input type="text" id="telefone_responsavel" placeholder="(00) 00000-0000"
                            oninput="formatarTelefone(this)" maxlength="15">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Parentesco</label>
                        <input type="text" id="parentesco" placeholder="Mãe, Pai, Irmão">
                    </div>
                </div>

                <div class="section-title-cadastroaluno">Endereço</div>
                <div class="form-grid-cadastroaluno">
                    <div class="form-group-cadastroaluno">
                        <label>CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" onblur="buscarCEP()"
                            oninput="formatarCEP(this)" maxlength="9">
                    </div>
                    <div class="form-group-cadastroaluno full-width-cadastroaluno">
                        <label>Endereço</label>
                        <input type="text" id="rua" placeholder="Rua...">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Número</label>
                        <input type="text" id="numero" placeholder="Nº">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Bairro</label>
                        <input type="text" id="bairro" placeholder="Bairro...">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Cidade</label>
                        <input type="text" id="cidade" placeholder="Cidade...">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>UF</label>
                        <input type="text" id="uf" placeholder="UF...">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Complemento</label>
                        <input type="text" id="complemento" placeholder="Complemento...">
                    </div>
                </div>

                <div class="section-title-cadastroaluno">Informações Escolares (Escola Regular)</div>
                <div class="form-grid-cadastroaluno">
                    <div class="form-group-cadastroaluno full-width-cadastroaluno">
                        <label>Nome da Escola</label>
                        <input type="text" id="escola_nome" placeholder="Escola onde estuda">
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Ano/Série</label>
                        <select id="escola_ano">
                            <option value="6">6º Ano</option>
                            <option value="7">7º Ano</option>
                            <option value="8">8º Ano</option>
                            <option value="9">9º Ano</option>
                            <option value="1">1º Ano (Ensino Médio)</option>
                            <option value="2">2º Ano (Ensino Médio)</option>
                            <option value="3">3º Ano (Ensino Médio)</option>
                        </select>
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Turma da Escola</label>
                        <input type="text" id="escola_turma" placeholder="Ex: A, B, Manhã...">
                    </div>
                </div>

                <div class="section-title-cadastroaluno">Turma no CCI</div>
                <div class="form-grid-cadastroaluno">
                    <div class="form-group-cadastroaluno">
                        <label>Sala</label>
                        <select id="sala_cci">
                            <option value="Sala 01">Sala 1</option>
                            <option value="Sala 02">Sala 2</option>
                            <option value="Sala 03">Sala 3</option>
                            <option value="Sala 04">Sala 4</option>
                        </select>
                    </div>
                    <div class="form-group-cadastroaluno">
                        <label>Horário de Estudo</label>
                        <select id="horario_cci">
                            <option value="0">17:00 - 18:15</option>
                            <option value="1">18:30 - 19:45</option>
                            <option value="2">19:45 - 21:00</option>
                            <option value="3">21:00 - 22:15</option>
                        </select>
                    </div>
                </div>

            </form>
        </div>

        <aside class="sidebaractions-cadastroaluno">
            <div class="photo-upload-cadastroaluno">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z" />
                </svg>
                <span class="photo-text-cadastroaluno">Adicionar Foto</span>
            </div>

            <button class="btn-action btn-submit" onclick="cadastrarAluno()">Salvar Matrícula</button>
            <button class="btn-action btn-cancel" onclick="window.location.href='CORD_painel.html'">Cancelar</button>
            <button class="btn-action btn-green" onclick="document.getElementById('importarAlunos').click()">
                Importar Planilha
            </button>

            <input type="file" id="importarAlunos" accept=".xlsx,.csv" hidden onchange="importarPlanilha(event)">

        </aside>
    </main>

    <script>
        function formatarCPF(campo) {
            let cpf = campo.value.replace(/\D/g, "");
            cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
            cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
            cpf = cpf.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            campo.value = cpf;
        }
        function formatarTelefone(campo) {
            let telefone = campo.value.replace(/\D/g, "");
            telefone = telefone.replace(/(\d{2})(\d)/, "($1) $2");
            telefone = telefone.replace(/(\d{5})(\d)/, "$1-$2");
            campo.value = telefone;
        }
        function fazerLogout() {
            if (confirm("Deseja realmente sair?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
        function formatarCEP(campo) {
            let cep = campo.value.replace(/\D/g, "");
            cep = cep.replace(/(\d{5})(\d)/, "$1-$2");
            campo.value = cep;
        }
        const firebaseConfig = {
            apiKey: "AIzaSyBvSOKw2VTeG1uMDqDn3-SWi0Hsf2z6i2w",
            authDomain: "sistema-cci-2026.firebaseapp.com",
            databaseURL: "https://sistema-cci-default-rtdb.firebaseio.com/",
            projectId: "sistema-cci-2026",
            storageBucket: "sistema-cci-2026.firebasestorage.app",
            messagingSenderId: "633401547904",
            appId: "1:633401547904:web:0572615ffba4227a6f5a65"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function buscarCEP() {
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();
                if (!data.erro) {
                    document.getElementById('uf').value = data.uf;
                    document.getElementById('cidade').value = data.localidade;
                    document.getElementById('rua').value = data.logradouro;
                    document.getElementById('bairro').value = data.bairro;
                    document.getElementById('numero').focus();
                }
            } catch (e) { console.error("Erro CEP"); }
        }

        function cadastrarAluno() {
            const nome = document.getElementById('nome_completo').value;
            if (!nome) return Swal.fire('Aviso', 'Nome é obrigatório', 'warning');

            const dadosAluno = {
                nome_completo: nome,
                email: document.getElementById('email_aluno').value,
                turma: document.getElementById('sala_cci').value,
                horario: document.getElementById('horario_cci').value,
                data_nascimento: document.getElementById('data_nascimento').value,
                cpf_aluno: document.getElementById('cpf_aluno').value,
                telefone: document.getElementById('telefone_aluno').value,

                nome_responsavel: document.getElementById('nome_responsavel').value,
                cpf_responsavel: document.getElementById('cpf_responsavel').value,
                telefone_responsavel: document.getElementById('telefone_responsavel').value,
                parentesco: document.getElementById('parentesco').value,

                endereco: {
                    cep: document.getElementById('cep').value,
                    rua: document.getElementById('rua').value,
                    numero: document.getElementById('numero').value,
                    bairro: document.getElementById('bairro').value
                },

                escola_regular: {
                    nome: document.getElementById('escola_nome').value,
                    ano: document.getElementById('escola_ano').value,
                    turma: document.getElementById('escola_turma').value
                },

                situacao: "Ativo",

                notas: {
                    p1: { n1: 0, n2: 0 },
                    p2: { n1: 0, n2: 0 },
                    p3: { n1: 0, n2: 0 },
                    p4: { n1: 0, n2: 0 }
                }
            };

            db.ref('alunos').push(dadosAluno).then(() => {
                Swal.fire('Sucesso!', 'Aluno matriculado.', 'success').then(() => location.reload());
            });
        }

        async function importarPlanilha(event) {
            const arquivo = event.target.files[0];
            if (!arquivo) return;

            const reader = new FileReader();
            reader.onload = async function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const linhas = XLSX.utils.sheet_to_json(sheet);

                if (!linhas.length) {
                    Swal.fire('Erro', 'Planilha vazia.', 'error');
                    return;
                }

                let cadastrados = 0;
                for (const linha of linhas) {
                    if (!linha.nome_completo) continue;

                    const dadosAluno = {
                        nome_completo: String(linha.nome_completo || "").trim(),
                        email: String(linha.email || "").trim(),
                        data_nascimento: String(linha.data_nascimento || "").trim(),
                        cpf_aluno: String(linha.cpf_aluno || "").trim(),
                        telefone: String(linha.telefone_aluno || "").trim(),
                        nome_responsavel: String(linha.nome_responsavel || "").trim(),
                        cpf_responsavel: String(linha.cpf_responsavel || "").trim(),
                        telefone_responsavel: String(linha.telefone_responsavel || "").trim(),
                        endereco: {
                            cep: String(linha.cep || "").trim(),
                            rua: String(linha.rua || "").trim(),
                            numero: String(linha.numero || "").trim(),
                            bairro: String(linha.bairro || "").trim(),
                            cidade: String(linha.cidade || "").trim(),
                            uf: String(linha.uf || "").trim(),
                            complemento: String(linha.complemento || "").trim()
                        },
                        escola_regular: {
                            nome: String(linha.escola_nome || "").trim(),
                            ano: String(linha.escola_ano || "").trim(),
                            turma: String(linha.escola_turma || "").trim()
                        },
                        turma: String(linha.sala_cci || "").trim(),
                        horario: String(linha.horario_cci || "").trim(),
                        situacao: "Ativo",
                        notas: {
                            p1: { n1: 0, n2: 0 },
                            p2: { n1: 0, n2: 0 },
                            p3: { n1: 0, n2: 0 },
                            p4: { n1: 0, n2: 0 }
                        }
                    };

                    await db.ref('alunos').push(dadosAluno);
                    cadastrados++;
                }

                Swal.fire('Sucesso!', `${cadastrados} alunos cadastrados.`, 'success');
            };
            reader.readAsArrayBuffer(arquivo);
        }

        document.getElementById('importarAlunos').addEventListener('change', importarPlanilha);
    </script>

</body>

</html>
